<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>模块化微缩模型排版工具</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">

    <!-- iOS Safari 全屏支持 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="模型排版">

    <style>
        :root {
            --bg: #f5f0eb;
            --panel-bg: #ffffff;
            --border: #d9d0c7;
            --text: #3d322b;
            --text-secondary: #6b5e53;
            --accent: #c17f59;
            --accent-hover: #a56b48;
            --danger: #c0392b;
            --danger-hover: #a93226;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            --radius: 10px;
            --radius-sm: 6px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
            background: #ede7e0; color: var(--text);
            min-height:100vh; display:flex; justify-content:center; align-items:flex-start;
            padding:20px; touch-action: manipulation; user-select: none;
        }
        .app-container { display:flex; flex-direction:column; gap:16px; width:100%; max-width:1100px; min-width:320px; }
        .header {
            background: var(--panel-bg); border-radius: var(--radius); padding:18px 24px;
            box-shadow: var(--shadow); display:flex; align-items:center; justify-content:space-between;
            flex-wrap:wrap; gap:14px; border:1px solid var(--border);
        }
        .header .logo-area { display:flex; align-items:center; gap:10px; }
        .header .logo-icon {
            width:38px; height:38px; border-radius: var(--radius-sm);
            background: linear-gradient(135deg, #d4a574, #c17f59);
            display:flex; align-items:center; justify-content:center; font-size:20px; color:#fff;
        }
        .header h1 { font-size:1.25rem; font-weight:700; color:#3d322b; }
        .settings-group { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
        .settings-group label { font-size:0.85rem; font-weight:600; color:var(--text-secondary); }
        .settings-group input[type="number"] {
            width:58px; padding:7px 8px; border:2px solid var(--border); border-radius:var(--radius-sm);
            font-size:0.9rem; text-align:center; font-weight:600; background:#fafaf8; font-family:inherit;
        }
        .dim-sep { font-weight:700; color:var(--text-secondary); }
        .btn {
            padding:8px 16px; border-radius:var(--radius-sm); border:none; cursor:pointer;
            font-weight:600; font-size:0.85rem; transition:0.2s; font-family:inherit;
        }
        .btn-accent { background:var(--accent); color:#fff; }
        .btn-accent:hover { background:var(--accent-hover); }
        .btn-outline { background:#fff; color:var(--accent); border:2px solid var(--accent); }
        .btn-outline:hover { background:#fdf5ef; }
        .btn-sm { padding:5px 10px; font-size:0.78rem; }
        .main-body { display:flex; gap:16px; flex:1; flex-wrap:wrap; }
        .side-panel {
            background:var(--panel-bg); border-radius:var(--radius); padding:16px; box-shadow:var(--shadow);
            width:240px; flex-shrink:0; display:flex; flex-direction:column; gap:14px; border:1px solid var(--border);
            max-height:620px; overflow-y:auto;
        }
        .side-panel h3 { font-size:0.95rem; font-weight:700; }
        .preset-modules { display:flex; flex-wrap:wrap; gap:8px; }
        .module-card {
            display:flex; align-items:center; justify-content:center; flex-direction:column;
            padding:10px 6px; border-radius:var(--radius-sm); cursor:pointer; border:2px solid transparent;
            transition:0.2s; min-width:56px; text-align:center; font-weight:600; font-size:0.8rem;
            background:#fafaf8; touch-action:manipulation;
        }
        .module-card.active { border-color:var(--accent); background:#fdf5ef; box-shadow:0 0 0 4px rgba(193,127,89,0.13); }
        .module-card .size-label { font-size:0.85rem; font-weight:700; }
        .module-card .color-dot { width:10px; height:10px; border-radius:50%; margin-top:4px; }
        .custom-module-form { display:flex; flex-direction:column; gap:8px; }
        .custom-module-form .row { display:flex; align-items:center; gap:6px; }
        .custom-module-form input {
            width:50px; padding:6px; border:2px solid var(--border); border-radius:var(--radius-sm);
            font-size:0.82rem; text-align:center; font-weight:600; background:#fafaf8; font-family:inherit;
        }
        .custom-module-form input[type="color"] { width:36px; height:32px; padding:2px; }
        .custom-module-form input.name-input { width:90px; }
        .canvas-area {
            background:var(--panel-bg); border-radius:var(--radius); padding:16px; box-shadow:var(--shadow);
            flex:1; display:flex; flex-direction:column; align-items:center; gap:10px; border:1px solid var(--border);
            min-width:280px;
        }
        .canvas-wrapper {
            position:relative; overflow:auto; border-radius:var(--radius-sm); background:#fdfdfc;
            display:flex; align-items:center; justify-content:center; flex:1; width:100%;
            min-height:400px; border:1px dashed #e0d8cf; cursor:crosshair; touch-action:none;
        }
        canvas { display:block; touch-action:none; }
        .canvas-info { display:flex; align-items:center; gap:16px; font-size:0.8rem; color:var(--text-secondary); flex-wrap:wrap; }
        .zoom-control input[type="range"] { width:90px; }
        .status-bar {
            background:var(--panel-bg); border-radius:var(--radius); padding:10px 18px; box-shadow:var(--shadow);
            display:flex; align-items:center; justify-content:space-between; font-size:0.78rem;
            border:1px solid var(--border); flex-wrap:wrap; gap:8px;
        }
        .badge { display:inline-block; padding:3px 10px; border-radius:20px; font-weight:700; font-size:0.75rem; }
        .badge-info { background:#e8f0f8; color:#4a6d8c; }
        .badge-warning { background:#fef3e4; color:#b87830; }
        .badge-success { background:#eaf5ea; color:#4a7c4a; }
        .status-left { display:flex; align-items:center; gap:12px; }
        @media (max-width:850px) {
            .main-body { flex-direction:column; }
            .side-panel { width:100%; flex-direction:row; flex-wrap:wrap; max-height:none; }
            .canvas-wrapper { min-height:300px; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <header class="header">
        <div class="logo-area"><div class="logo-icon">📐</div><h1>微缩模型排版</h1></div>
        <div class="settings-group">
            <label>底板尺寸：</label>
            <input type="number" id="gridWidth" value="8" min="1" max="40">
            <span class="dim-sep">×</span>
            <input type="number" id="gridHeight" value="8" min="1" max="40">
            <button class="btn btn-accent btn-sm" id="btnApplyGrid">应用</button>
            <button class="btn btn-outline btn-sm" id="btnClearAll">🗑 清空</button>
        </div>
    </header>
    <div class="main-body">
        <aside class="side-panel">
            <div>
                <h3>📦 预设模块</h3>
                <div class="preset-modules" id="presetModules"></div>
            </div>
            <div>
                <h3>✏️ 自定义模块</h3>
                <div class="custom-module-form">
                    <div class="row">
                        <label>宽:</label><input type="number" id="customW" value="3" min="1" max="40">
                        <label>高:</label><input type="number" id="customH" value="3" min="1" max="40">
                        <input type="color" id="customColor" value="#4CAF50">
                    </div>
                    <div class="row">
                        <label>名称:</label><input type="text" id="customName" value="自定义" class="name-input" placeholder="场景名称">
                    </div>
                    <button class="btn btn-accent btn-sm" id="btnAddCustom">➕ 添加到库</button>
                </div>
            </div>
            <div style="font-size:0.75rem;color:var(--text-secondary);">
                💡 点击模块卡片→在网格上点击放置<br>双击/长按已放模块可重命名<br>拖拽移动 | 右键/长按删除<br>双指缩放画布 | 🔍滑块缩放
            </div>
        </aside>
        <section class="canvas-area">
            <div class="canvas-wrapper" id="canvasWrapper"><canvas id="mainCanvas"></canvas></div>
            <div class="canvas-info">
                <span>已占用：<strong id="statUsed">0</strong>/<strong id="statTotal">64</strong></span>
                <span>模块数：<strong id="statModules">0</strong></span>
                <span>占用率：<strong id="statRatio">0%</strong></span>
                <span class="zoom-control">
                    🔍 <input type="range" id="zoomSlider" min="10" max="200" value="100" step="5">
                    <span id="zoomVal">100%</span>
                </span>
            </div>
        </section>
    </div>
    <footer class="status-bar">
        <div class="status-left">
            <span id="statusText" class="badge badge-info">就绪</span>
            <button class="btn btn-outline btn-sm" id="btnRename" style="display:none;">✏️ 重命名</button>
            <span id="selectedInfo" style="font-size:0.75rem; color:var(--text-secondary);"></span>
        </div>
        <span>快捷键：R旋转 Esc取消 Delete删除 | 双指可缩放画布</span>
    </footer>
</div>

<script>
(function() {
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const canvasWrapper = document.getElementById('canvasWrapper');
    const presetModulesEl = document.getElementById('presetModules');
    const statUsed = document.getElementById('statUsed');
    const statTotal = document.getElementById('statTotal');
    const statModules = document.getElementById('statModules');
    const statRatio = document.getElementById('statRatio');
    const statusText = document.getElementById('statusText');
    const zoomSlider = document.getElementById('zoomSlider');
    const zoomVal = document.getElementById('zoomVal');
    const btnRename = document.getElementById('btnRename');
    const selectedInfo = document.getElementById('selectedInfo');

    const DEFAULT_CELL_SIZE = 52;
    let gridWidth = 8, gridHeight = 8, cellSize = DEFAULT_CELL_SIZE, zoom = 1.0;
    let placedModules = [];
    let moduleIdCounter = 0;
    let appState = 'idle';
    let selectedTemplate = null;
    let hoveredGridX = -1, hoveredGridY = -1;
    let movingModuleId = null, movingModuleOrigX = null, movingModuleOrigY = null;
    let isDragging = false;
    let selectedModuleId = null;
    let mouseDownModuleId = null;
    let longPressTimer;

    let initialPinchDist = 0;
    let initialZoom = 1.0;

    const paletteColors = [
        '#4CAF50','#2196F3','#FF9800','#9C27B0','#F44336',
        '#00BCD4','#FFEB3B','#795548','#607D8B','#E91E63',
        '#3F51B5','#009688','#CDDC39','#FF5722','#8BC34A',
        '#673AB7','#03A9F4','#FFC107','#555555','#26A69A'
    ];
    let paletteIndex = 0;

    const presetTemplates = [
        { width:4, height:8, name:'4×8' }, { width:8, height:4, name:'8×4' },
        { width:4, height:5, name:'4×5' }, { width:5, height:4, name:'5×4' },
        { width:1, height:1, name:'1×1' }, { width:2, height:2, name:'2×2' },
        { width:2, height:4, name:'2×4' }, { width:4, height:2, name:'4×2' },
        { width:3, height:3, name:'3×3' }, { width:2, height:3, name:'2×3' },
        { width:3, height:2, name:'3×2' }, { width:6, height:4, name:'6×4' }
    ];
    let availableTemplates = [];

    function initTemplates() {
        availableTemplates = presetTemplates.map((t,i) => ({
            ...t, color: paletteColors[i % paletteColors.length], id:'preset_'+i
        }));
        paletteIndex = presetTemplates.length % paletteColors.length;
    }
    initTemplates();

    function getNextColor() {
        const c = paletteColors[paletteIndex % paletteColors.length];
        paletteIndex++;
        return c;
    }

    function getCanvasCoordsFromEvent(e) {
        const rect = canvas.getBoundingClientRect();
        const cx = e.touches ? e.touches[0].clientX : e.clientX;
        const cy = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: (cx - rect.left) * (canvas.width / rect.width), y: (cy - rect.top) * (canvas.height / rect.height) };
    }

    function getGridCell(cx, cy) {
        const gx = Math.floor(cx / cellSize), gy = Math.floor(cy / cellSize);
        return (gx>=0 && gx<gridWidth && gy>=0 && gy<gridHeight) ? {gx,gy} : null;
    }

    function getModuleBounds(m) { return { x1:m.gridX, y1:m.gridY, x2:m.gridX+m.width-1, y2:m.gridY+m.height-1 }; }
    function rectsOverlap(a,b) { return !(a.x2<b.x1 || a.x1>b.x2 || a.y2<b.y1 || a.y1>b.y2); }
    function isPlacementValid(gx,gy,w,h,excludeId=null) {
        if(gx<0||gy<0||gx+w>gridWidth||gy+h>gridHeight) return false;
        const cand = {x1:gx,y1:gy,x2:gx+w-1,y2:gy+h-1};
        for(const m of placedModules) if(m.id!==excludeId && rectsOverlap(cand, getModuleBounds(m))) return false;
        return true;
    }
    function getModuleAt(gx,gy) {
        for(const m of placedModules) {
            const b = getModuleBounds(m);
            if(gx>=b.x1 && gx<=b.x2 && gy>=b.y1 && gy<=b.y2) return m;
        }
        return null;
    }

    function placeModule(gx, gy, template) {
        if(!isPlacementValid(gx,gy,template.width,template.height)) return false;
        const newMod = {
            id: moduleIdCounter++,
            name: template.name || `${template.width}×${template.height}`,
            width: template.width, height: template.height,
            gridX: gx, gridY: gy, color: template.color
        };
        placedModules.push(newMod);
        render();
        setStatus('success', `已放置：${newMod.name}`);
        return true;
    }

    function removeModule(id) {
        const idx = placedModules.findIndex(m=>m.id===id);
        if(idx>=0) {
            const r = placedModules.splice(idx,1)[0];
            if(selectedModuleId === id) clearSelection();
            render();
            setStatus('warning', `已移除：${r.name}`);
        }
    }

    function moveModuleTo(id, newX, newY) {
        const mod = placedModules.find(m=>m.id===id);
        if(!mod || !isPlacementValid(newX,newY,mod.width,mod.height,id)) return false;
        mod.gridX = newX; mod.gridY = newY;
        render();
        setStatus('info', `已移动：${mod.name}`);
        return true;
    }

    function renameModule(id, newName) {
        const mod = placedModules.find(m=>m.id===id);
        if(mod && newName.trim()) {
            mod.name = newName.trim();
            render();
            updateSelectionInfo();
            setStatus('info', `已重命名：${mod.name}`);
        }
    }

    function clearSelection() {
        selectedModuleId = null;
        btnRename.style.display = 'none';
        selectedInfo.textContent = '';
        render();
    }

    function selectModule(id) {
        selectedModuleId = id;
        const mod = placedModules.find(m=>m.id===id);
        if(mod) {
            btnRename.style.display = 'inline-block';
            selectedInfo.textContent = `已选中：${mod.name} (${mod.width}×${mod.height})`;
        }
        render();
    }

    function updateSelectionInfo() {
        if(selectedModuleId) {
            const mod = placedModules.find(m=>m.id===selectedModuleId);
            if(mod) selectedInfo.textContent = `已选中：${mod.name} (${mod.width}×${mod.height})`;
            else clearSelection();
        }
    }

    function clearAll() {
        if(placedModules.length && confirm('清空所有模块？')) {
            placedModules = [];
            appState='idle'; selectedTemplate=null; movingModuleId=null; clearSelection();
            render(); setStatus('warning','已清空');
        }
    }

    function rotateTemplate() {
        if(appState==='placing' && selectedTemplate) {
            const w=selectedTemplate.width, h=selectedTemplate.height;
            selectedTemplate.width=h; selectedTemplate.height=w;
            selectedTemplate.name=`${h}×${w}`;
            render(); setStatus('info',`已旋转：${selectedTemplate.name}`);
        }
    }

    function setStatus(type, msg) {
        statusText.textContent = msg;
        statusText.className = 'badge badge-'+type;
        clearTimeout(statusText._timeout);
        statusText._timeout = setTimeout(()=>{
            statusText.textContent='就绪';
            statusText.className='badge badge-info';
        }, 2500);
    }

    function updateCardsHighlight() {
        document.querySelectorAll('.module-card').forEach(card => {
            const tid = card.dataset.templateId;
            card.classList.toggle('active', appState==='placing' && selectedTemplate && selectedTemplate._cardId===tid);
        });
    }

    function selectTemplate(index) {
        const tmpl = availableTemplates[index];
        selectedTemplate = {
            width:tmpl.width, height:tmpl.height, color:tmpl.color,
            name:tmpl.name, _cardId:'tmpl_'+index
        };
        appState='placing'; movingModuleId=null; isDragging=false; clearSelection();
        updateCardsHighlight(); render();
        setStatus('info',`已选择：${tmpl.name}，点击网格放置`);
    }

    function cancelPlacing() {
        if(appState==='placing') { appState='idle'; selectedTemplate=null; updateCardsHighlight(); }
        if(appState==='moving') {
            if(movingModuleId && movingModuleOrigX!==null) {
                const mod = placedModules.find(m=>m.id===movingModuleId);
                if(mod) { mod.gridX=movingModuleOrigX; mod.gridY=movingModuleOrigY; }
            }
            appState='idle'; movingModuleId=null; isDragging=false;
        }
        render(); setStatus('info','已取消');
    }

    function updateCanvasSize() {
        const w = gridWidth * cellSize;
        const h = gridHeight * cellSize;
        canvas.width = w;
        canvas.height = h;
        canvas.style.width = (w * zoom) + 'px';
        canvas.style.height = (h * zoom) + 'px';
    }

    function applyZoom(newZoom) {
        zoom = Math.min(2.0, Math.max(0.1, newZoom));
        zoomSlider.value = Math.round(zoom * 100);
        zoomVal.textContent = Math.round(zoom * 100) + '%';
        updateCanvasSize();
        render();
    }

    function render() {
        const w = canvas.width, h = canvas.height;
        ctx.clearRect(0,0,w,h);
        ctx.fillStyle = '#fdfdfc';
        ctx.fillRect(0,0,w,h);

        for(let x=0; x<=gridWidth; x++) {
            const isMajor = (x % 4 === 0);
            ctx.strokeStyle = isMajor ? '#c0b7aa' : '#e8e3db';
            ctx.lineWidth = isMajor ? 1.2 : 0.5;
            ctx.beginPath(); ctx.moveTo(x*cellSize,0); ctx.lineTo(x*cellSize, h); ctx.stroke();
        }
        for(let y=0; y<=gridHeight; y++) {
            const isMajor = (y % 4 === 0);
            ctx.strokeStyle = isMajor ? '#c0b7aa' : '#e8e3db';
            ctx.lineWidth = isMajor ? 1.2 : 0.5;
            ctx.beginPath(); ctx.moveTo(0,y*cellSize); ctx.lineTo(w, y*cellSize); ctx.stroke();
        }

        if(zoom * cellSize >= 14) {
            ctx.fillStyle = '#d5cfc7';
            ctx.font = `${Math.max(8, cellSize*0.2)}px sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            for(let x=0; x<gridWidth; x++) {
                for(let y=0; y<gridHeight; y++) {
                    ctx.fillText(`${x+1},${y+1}`, (x+0.5)*cellSize, (y+0.5)*cellSize);
                }
            }
        }

        for(const mod of placedModules) {
            const isSelected = (mod.id === selectedModuleId);
            drawModule(mod.gridX,mod.gridY,mod.width,mod.height,mod.color,mod.name,1.0, false, null, isSelected);
        }

        if(appState==='placing' && selectedTemplate && hoveredGridX>=0 && hoveredGridY>=0) {
            const valid = isPlacementValid(hoveredGridX,hoveredGridY,selectedTemplate.width,selectedTemplate.height);
            drawModule(hoveredGridX,hoveredGridY,selectedTemplate.width,selectedTemplate.height,
                selectedTemplate.color,selectedTemplate.name, valid?0.55:0.3, false, valid?'#2ecc71':'#e74c3c');
        }
        if(appState==='moving' && movingModuleId && hoveredGridX>=0 && hoveredGridY>=0) {
            const mod = placedModules.find(m=>m.id===movingModuleId);
            if(mod) {
                const valid = isPlacementValid(hoveredGridX,hoveredGridY,mod.width,mod.height,movingModuleId);
                drawModule(hoveredGridX,hoveredGridY,mod.width,mod.height,mod.color,mod.name,
                    valid?0.6:0.3, true, valid?'#2ecc71':'#e74c3c');
            }
        }
        updateStats();
    }

    function drawModule(gx,gy,mw,mh,color,name,alpha,ghost=false,borderColor=null,selected=false) {
        const x=gx*cellSize, y=gy*cellSize, w=mw*cellSize, h=mh*cellSize;
        const pad = Math.max(1, cellSize*0.06);
        ctx.fillStyle = hexToRgba(color, alpha);
        ctx.fillRect(x+pad, y+pad, w-pad*2, h-pad*2);
        if(selected && !ghost) {
            ctx.strokeStyle = '#2980b9'; ctx.lineWidth = 3; ctx.setLineDash([4,2]);
            ctx.strokeRect(x+pad-1, y+pad-1, w-pad*2+2, h-pad*2+2);
            ctx.setLineDash([]);
        } else {
            ctx.strokeStyle = borderColor || (ghost?'#ffffff':'rgba(0,0,0,0.3)');
            ctx.lineWidth = ghost?2.5:1.8;
            if(ghost) ctx.setLineDash([5,3]);
            ctx.strokeRect(x+pad, y+pad, w-pad*2, h-pad*2);
            ctx.setLineDash([]);
        }
        if(Math.min(w,h) > 18 && alpha > 0.4) {
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            const fontSize = Math.max(7, Math.min(cellSize*0.35, Math.min(w,h)*0.35));
            ctx.font = `bold ${fontSize}px sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(name, x+w/2, y+h/2);
        }
    }

    function hexToRgba(hex,a) {
        const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
        return `rgba(${r},${g},${b},${a})`;
    }

    function updateStats() {
        const total = gridWidth * gridHeight;
        const used = new Set();
        for(const m of placedModules) for(let dx=0;dx<m.width;dx++) for(let dy=0;dy<m.height;dy++) used.add(`${m.gridX+dx},${m.gridY+dy}`);
        statUsed.textContent=used.size;
        statTotal.textContent=total;
        statModules.textContent=placedModules.length;
        statRatio.textContent=total?Math.round((used.size/total)*100)+'%':'0%';
    }

    function getTouchDist(touches) {
        if(touches.length < 2) return 0;
        const dx = touches[0].clientX - touches[1].clientX;
        const dy = touches[0].clientY - touches[1].clientY;
        return Math.sqrt(dx*dx + dy*dy);
    }

    function onPointerDown(e) {
        e.preventDefault();
        const touches = e.touches;
        if(touches && touches.length === 2) {
            initialPinchDist = getTouchDist(touches);
            initialZoom = zoom;
            return;
        }
        const coords = getCanvasCoordsFromEvent(e);
        const cell = getGridCell(coords.x, coords.y);
        if(e.button===2 || (touches && touches.length>1)) {
            if(cell && appState==='idle') { const m = getModuleAt(cell.gx,cell.gy); if(m) removeModule(m.id); }
            if(appState!=='idle') cancelPlacing();
            return;
        }
        if(appState==='placing' && selectedTemplate && cell) {
            placeModule(cell.gx, cell.gy, selectedTemplate);
            return;
        }
        if(appState==='moving' && movingModuleId && cell) {
            if(moveModuleTo(movingModuleId, cell.gx, cell.gy)) { appState='idle'; movingModuleId=null; isDragging=false; }
            return;
        }
        if(appState==='idle' && cell) {
            const mod = getModuleAt(cell.gx, cell.gy);
            if(mod) {
                movingModuleOrigX=mod.gridX; movingModuleOrigY=mod.gridY;
                mouseDownModuleId = mod.id;
                isDragging = false;
                clearTimeout(longPressTimer);
                longPressTimer = setTimeout(() => {
                    if(!isDragging && mouseDownModuleId === mod.id && appState==='idle') {
                        const newName = prompt('重命名模块：', mod.name);
                        if(newName) renameModule(mod.id, newName);
                        mouseDownModuleId = null;
                        clearSelection();
                    }
                }, 600);
            } else {
                clearSelection();
            }
        }
    }

    function onPointerMove(e) {
        e.preventDefault();
        const touches = e.touches;
        if(touches && touches.length === 2 && initialPinchDist > 0) {
            const newDist = getTouchDist(touches);
            const scale = newDist / initialPinchDist;
            applyZoom(initialZoom * scale);
            return;
        }
        const coords = getCanvasCoordsFromEvent(e);
        const cell = getGridCell(coords.x, coords.y);
        hoveredGridX = cell?cell.gx:-1;
        hoveredGridY = cell?cell.gy:-1;

        if(mouseDownModuleId && !isDragging && cell) {
            const mod = placedModules.find(m=>m.id===mouseDownModuleId);
            if(mod) {
                const dx = Math.abs(coords.x - (mod.gridX * cellSize));
                const dy = Math.abs(coords.y - (mod.gridY * cellSize));
                if(dx>5 || dy>5) {
                    clearTimeout(longPressTimer);
                    isDragging = true;
                    movingModuleId = mouseDownModuleId;
                    appState = 'moving';
                    setStatus('info','移动中...');
                    mod.gridX = cell.gx;
                    mod.gridY = cell.gy;
                }
            }
        }
        if(appState==='moving' && movingModuleId && cell) {
            const mod = placedModules.find(m=>m.id===movingModuleId);
            if(mod) { mod.gridX=cell.gx; mod.gridY=cell.gy; }
        }
        render();
    }

    function onPointerUp(e) {
        e.preventDefault();
        if(e.touches && e.touches.length < 2) {
            initialPinchDist = 0;
        }
        clearTimeout(longPressTimer);
        if(appState==='moving' && movingModuleId) {
            const mod = placedModules.find(m=>m.id===movingModuleId);
            const finalX = mod?mod.gridX:0, finalY = mod?mod.gridY:0;
            if(!moveModuleTo(movingModuleId, finalX, finalY)) {
                if(mod) { mod.gridX=movingModuleOrigX; mod.gridY=movingModuleOrigY; }
                setStatus('warning','无法放置，已恢复原位');
            }
            appState='idle'; movingModuleId=null; isDragging=false;
        } else if(mouseDownModuleId && !isDragging && appState==='idle') {
            selectModule(mouseDownModuleId);
        }
        mouseDownModuleId = null;
        render();
    }

    function onPointerLeave(e) {
        clearTimeout(longPressTimer);
        initialPinchDist = 0;
        hoveredGridX=-1; hoveredGridY=-1;
        if(appState==='moving' && movingModuleId) {
            const mod = placedModules.find(m=>m.id===movingModuleId);
            if(mod) { mod.gridX=movingModuleOrigX; mod.gridY=movingModuleOrigY; }
            appState='idle'; movingModuleId=null; isDragging=false;
        }
        mouseDownModuleId=null;
        render();
    }

    canvas.addEventListener('mousedown', onPointerDown);
    canvas.addEventListener('mousemove', onPointerMove);
    canvas.addEventListener('mouseup', onPointerUp);
    canvas.addEventListener('mouseleave', onPointerLeave);
    canvas.addEventListener('touchstart', onPointerDown, {passive:false});
    canvas.addEventListener('touchmove', onPointerMove, {passive:false});
    canvas.addEventListener('touchend', onPointerUp);
    canvas.addEventListener('touchcancel', onPointerLeave);
    canvas.addEventListener('contextmenu', e=>e.preventDefault());
    canvas.addEventListener('dblclick', e => {
        const coords = getCanvasCoordsFromEvent(e);
        const cell = getGridCell(coords.x, coords.y);
        if(cell && appState==='idle') {
            const mod = getModuleAt(cell.gx, cell.gy);
            if(mod) {
                const newName = prompt('重命名模块：', mod.name);
                if(newName) renameModule(mod.id, newName);
            }
        }
    });

    document.addEventListener('keydown', e => {
        if(e.key==='r'||e.key==='R') { if(appState==='placing') rotateTemplate(); }
        if(e.key==='Escape') cancelPlacing();
        if((e.key==='Delete'||e.key==='Backspace') && selectedModuleId) {
            removeModule(selectedModuleId);
            clearSelection();
        }
    });

    document.getElementById('btnApplyGrid').addEventListener('click', ()=>{
        const nw = parseInt(document.getElementById('gridWidth').value);
        const nh = parseInt(document.getElementById('gridHeight').value);
        if(isNaN(nw)||isNaN(nh)||nw<1||nh<1) return;
        const out = placedModules.filter(m=>m.gridX+m.width>nw||m.gridY+m.height>nh);
        if(out.length && !confirm(`有${out.length}个模块超出边界将被移除，继续？`)) return;
        placedModules = placedModules.filter(m=>m.gridX+m.width<=nw && m.gridY+m.height<=nh);
        gridWidth=nw; gridHeight=nh;
        document.getElementById('gridWidth').value=nw;
        document.getElementById('gridHeight').value=nh;
        cancelPlacing();
        updateCanvasSize();
        autoFitZoom();
        render();
    });
    document.getElementById('btnClearAll').addEventListener('click', clearAll);
    document.getElementById('btnAddCustom').addEventListener('click', ()=>{
        const cw=parseInt(document.getElementById('customW').value);
        const ch=parseInt(document.getElementById('customH').value);
        const color=document.getElementById('customColor').value;
        let name=document.getElementById('customName').value.trim() || `${cw}×${ch}`;
        if(isNaN(cw)||isNaN(ch)||cw<1||ch<1) return;
        availableTemplates.push({width:cw,height:ch,name:name,color:color,id:'custom_'+Date.now()});
        renderPresetModules();
        selectTemplate(availableTemplates.length-1);
    });
    btnRename.addEventListener('click', ()=>{
        if(selectedModuleId) {
            const mod = placedModules.find(m=>m.id===selectedModuleId);
            if(mod) {
                const newName = prompt('重命名模块：', mod.name);
                if(newName) renameModule(mod.id, newName);
            }
        }
    });

    zoomSlider.addEventListener('input', ()=>{
        applyZoom(parseInt(zoomSlider.value) / 100);
    });

    function renderPresetModules() {
        presetModulesEl.innerHTML = '';
        availableTemplates.forEach((tmpl, idx) => {
            const card = document.createElement('div');
            card.className = 'module-card';
            card.dataset.templateId = 'tmpl_'+idx;
            card.innerHTML = `<span class="size-label">${tmpl.width}×${tmpl.height}</span><span class="color-dot" style="background:${tmpl.color};"></span><small style="font-size:0.7rem;">${tmpl.name}</small>`;
            card.addEventListener('click', ()=> selectTemplate(idx));
            presetModulesEl.appendChild(card);
        });
        updateCardsHighlight();
    }

    function autoFitZoom() {
        const rect = canvasWrapper.getBoundingClientRect();
        const availW = rect.width - 40;
        const availH = rect.height - 40;
        if (availW <= 0 || availH <= 0) {
            zoom = 1.0;
        } else {
            const fitW = availW / (gridWidth * cellSize);
            const fitH = availH / (gridHeight * cellSize);
            zoom = Math.min(fitW, fitH, 2.0);
            zoom = Math.max(0.1, Math.min(2.0, zoom));
        }
        zoom = Math.round(zoom * 100) / 100;
        zoomSlider.value = Math.round(zoom * 100);
        zoomVal.textContent = Math.round(zoom * 100) + '%';
        updateCanvasSize();
    }

    window.addEventListener('resize', ()=>{
        clearTimeout(window._resizeTimer);
        window._resizeTimer = setTimeout(()=>{ autoFitZoom(); render(); }, 200);
    });

    renderPresetModules();
    updateCanvasSize();
    autoFitZoom();
    render();

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('service-worker.js')
                .then(reg => console.log('SW 注册成功', reg.scope))
                .catch(err => console.log('SW 注册失败', err));
        });
    }
})();
</script>
</body>
</html>
